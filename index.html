<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login Simples</title>
</head>
<body>

  <h2>Login</h2>

  <input type="text" id="usuario" placeholder="Usuário"><br><br>
  <input type="password" id="senha" placeholder="Senha"><br><br>

  <button onclick="login()">Entrar</button>

  <p id="mensagem"></p>

  <script>
    function login() {
      var user = document.getElementById("usuario").value;
      var pass = document.getElementById("senha").value;

      // usuário e senha fixos
      if (user === "admin" && pass === "1234") {
        document.getElementById("mensagem").innerHTML = "Login realizado com sucesso!";
        window.location.href = "home.html"; // redireciona
      } else {
        document.getElementById("mensagem").innerHTML = "Usuário ou senha inválidos!";
      }
    }
  </script>

</body>
</html>
