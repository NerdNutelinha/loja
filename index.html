<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
  overflow: hidden;
  color: white;
}

/* Caixa login */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.8);
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

/* Área logada */
#areaLogada {
  display: none;
  text-align: center;
  margin-top: 20%;
  font-size: 25px;
}

/* Inputs */
input {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 200px;
  border-radius: 10px;
  border: none;
}

/* Botão */
button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #ff1e4d;
}

/* Corações */
.heart {
  position: absolute;
  color: #ff4d6d;
  animation: subir linear infinite;
}

@keyframes subir {
  0% {
    transform: translateY(100vh);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>

</head>
<body>

<!-- LOGIN -->
<div class="container" id="loginBox">
  <h2>Login ❤️</h2>

  <input type="text" id="usuario" placeholder="Usuário">
  <input type="password" id="senha" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <p id="mensagem"></p>
</div>

<!-- AREA LOGADA -->
<div id="areaLogada">
  <h1>Bem-vinda 💖</h1>
  <p>Você entrou com sucesso!</p>
</div>

<script>
function login() {
  var user = document.getElementById("usuario").value;
  var pass = document.getElementById("senha").value;

  if (user === "admin" && pass === "1234") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("areaLogada").style.display = "block";
  } else {
    document.getElementById("mensagem").innerHTML = "Login inválido!";
  }
}

// Corações subindo
function criarCoracao() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(criarCoracao, 300);
</script>

</body>
</html>
